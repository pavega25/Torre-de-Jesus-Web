<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        @font-face {
            font-family: 'Title-Cinzel';
            src: url(assets/fonts/Cinzel-VariableFont_wght.woff2);
            font-display: swap;
        }
        :root {
            --primary: #50362a;
            --secondary: #77b5ce;
            --accent: #dc0526;
            --hover-accent: #f5062a;
            --bg: #f2f2f2;
            --title: 'Title-Cinzel';
            --body: 'system-ui';
        }
        body {    
            background-image: url('https://blog.sagradafamilia.org/wp-content/uploads/2019/07/album-quart-sagrada-familia-1.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 50%;
        }
        .cont {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0;
            background-color: var(--bg);
            padding: 50px;
            max-width: 600px;
            height: 100%;
            width: 100%;
            border-radius: 40px;
            box-shadow: 0 0 50px #00000077;
        }
        .error {
            font-family: var(--title);
            font-size: 1.5em;
            font-weight: 600;
            color: var(--primary);
            text-shadow: 2px 3px 2px rgba(0, 0, 0, 0.26);
            margin-top: 40px;
        }
        h1 {
            font-size: 10em;
            font-family: var(--title);
            text-shadow: 5px 5px 3px rgba(0, 0, 0, 0.26);
            color: var(--primary);
        }
        p {
            font-weight: 500;
            font-size: 1.2em;
            text-align: center;
        }
        a {
            padding: 10px 20px;
            margin: 40px;
            text-decoration: none;
            background-color: red;
            border-radius: 30px;
            color: white;
            font-size: 1.2em;
            font-weight: 600;
            font-family: var(--title);
        }
        @media (max-width: 470px) {
            .error {
                font-size: 1.4em;
                font-weight: 600;
            }
            h1 {
                font-size: 8em;
            }
            p {
                font-size: 1em;
            }
            a {
                font-size: 1.1em;
            } 
        }
    </style>
</head>
<body>
    <section>
        <div class="cont">
            <p class="error">Error</p>
            <h1>404</h1>
            <p>Esta parte de la basílica aún está en construcción, lo sentimos.</p>
            <a href="index.html">Ir al inicio</a>
        </div>
    </section>
</body>
</html>
